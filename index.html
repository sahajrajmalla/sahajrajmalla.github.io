<script>
(function () {
  function get() {
    try {
      var t = localStorage.getItem('sahaj-theme');
      if (t === 'light' || t === 'dark') return t;
    } catch (e) {}
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  }
  var theme = get();
  document.documentElement.setAttribute('data-theme', theme);
  window.__setTheme = function (t) {
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem('sahaj-theme', t); } catch (e) {}
    var m = document.querySelector('meta[name="theme-color"]');
    if (m) m.setAttribute('content', t === 'light' ? '#fff6e2' : '#060c1a');
    try { window.dispatchEvent(new CustomEvent('sahajtheme', { detail: t })); } catch (e) {}
  };
  window.__toggleTheme = function () {
    var cur = document.documentElement.getAttribute('data-theme') || 'dark';
    window.__setTheme(cur === 'dark' ? 'light' : 'dark');
  };
  // keep meta theme-color correct on first load
  var m0 = document.querySelector('meta[name="theme-color"]');
  if (m0) m0.setAttribute('content', theme === 'light' ? '#fff6e2' : '#060c1a');
})();
</script>

<!-- Fade out loading spinner once React has painted — clears the instant #root fills; multiple independent fallbacks so it can never trap the page -->
<script>
(function () {
  var loading = document.getElementById('loading');
  if (!loading) return;
  var done = false;
  function remove() {
    if (done) return; done = true;
    loading.style.opacity = '0';
    setTimeout(function () { if (loading.parentNode) loading.parentNode.removeChild(loading); }, 400);
  }
  var root = document.getElementById('root');
  function mounted() { return root && root.children.length > 0; }
  if (mounted()) { remove(); return; }
  // 1) observe #root for React's first paint
  if (root && 'MutationObserver' in window) {
    var mo = new MutationObserver(function () { if (mounted()) { mo.disconnect(); remove(); } });
    mo.observe(root, { childList: true });
  }
  // 2) fast polling fallback (covers environments where the observer misses)
  var polls = 0;
  var iv = setInterval(function () {
    if (mounted() || polls++ > 200) { clearInterval(iv); if (mounted()) remove(); }
  }, 100);
  // 3) window load nudge
  window.addEventListener('load', function () { setTimeout(function () { if (mounted()) remove(); }, 400); });
  // 4) absolute failsafe — never let the spinner sit forever
  setTimeout(remove, 4500);
})();
</script>
