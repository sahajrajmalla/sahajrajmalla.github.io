*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

::-webkit-scrollbar-thumb:hover { background: #2255e8; }

/* === KEYFRAMES === */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes heroFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(-8px); }
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes fabBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes galleryReveal { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

/* === ANIMATION HELPERS === */
.anim-1  { opacity: 0; animation: fadeUp 0.55s ease 0.15s forwards; }
.anim-2  { opacity: 0; animation: fadeUp 0.60s ease 0.30s forwards; }
.anim-3  { opacity: 0; animation: fadeUp 0.60s ease 0.45s forwards; }
.anim-4  { opacity: 0; animation: fadeUp 0.50s ease 0.58s forwards; }
.anim-5  { opacity: 0; animation: fadeUp 0.60s ease 0.72s forwards; }
.anim-6  { opacity: 0; animation: fadeUp 0.60s ease 0.88s forwards; }

.anim-8  { opacity: 0; animation: fadeUp 0.60s ease 1.16s forwards; }

<!-- Fade out loading spinner once React has painted -->
<script>
(function () {
  var tries = 0;
  function check() {
    var root = document.getElementById('root');
    var loading = document.getElementById('loading');
    if (!loading) return;
    if (root && root.children.length > 0) {
      loading.style.opacity = '0';
      setTimeout(function () { if (loading.parentNode) loading.parentNode.removeChild(loading); }, 450);
    } else if (tries++ < 100) {
      setTimeout(check, 120);
    }
  }
  setTimeout(check, 400);
})();
</script>
